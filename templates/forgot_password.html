{% extends 'base.html' %}
{% block title %}Forgot Password | Aletheia{% endblock %}
{% block styles %}
<style>
    .auth-wrapper { display: flex; justify-content: center; align-items: center; margin-top: 40px; }
    .auth-card { width: 100%; max-width: 420px; padding: 50px 40px; }
    h2 { font-family: var(--font-display); font-size: 2rem; margin: 0 0 8px 0; text-align: center; }
    .sub-text { color: var(--text-muted); text-align: center; margin-bottom: 30px; font-size: 0.95rem; line-height: 1.5;}
    .footer-text { text-align: center; margin-top: 30px; font-size: 0.9rem; color: var(--text-muted); }
    .footer-text a { color: var(--primary); font-weight: 600; text-decoration: none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrapper anim-pop">
    <div class="card auth-card">
        <h2>Override Request</h2>
        <p class="sub-text">Enter your registered email address to generate a new cryptographic key.</p>
        <form method="POST">
            <input name="email" placeholder="Email Address" type="email" required>
            <button type="submit" class="btn-primary" style="width: 100%;">Transmit Code</button>
        </form>
        <div class="footer-text">Key located? <a href="/login">Return to Login</a></div>
    </div>
</div>
{% endblock %}
