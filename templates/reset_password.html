{% extends 'base.html' %}
{% block title %}Reset Password | Aletheia{% endblock %}
{% block styles %}
<style>
    .auth-wrapper { display: flex; justify-content: center; align-items: center; margin-top: 40px; }
    .auth-card { width: 100%; max-width: 420px; padding: 50px 40px; }
    h2 { font-family: var(--font-display); font-size: 2rem; margin: 0 0 8px 0; text-align: center; }
    .sub-text { color: var(--text-muted); text-align: center; margin-bottom: 30px; font-size: 0.95rem; }
    .error-msg { color: var(--danger); font-size: 0.8rem; font-weight: 500; display: none; margin-top: -15px; margin-bottom: 15px; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrapper anim-pop">
    <div class="card auth-card">
        <h2>Update Cipher</h2>
        <p class="sub-text">Enter and verify your new cryptographic key.</p>
        <form method="POST" id="resetForm">
            <input name="password" id="pwd" placeholder="New Password" type="password" required>
            <input name="confirm_password" id="confirmPwd" placeholder="Verify Password" type="password" required>
            <div id="pwdError" class="error-msg">Passwords do not match.</div>
            <button type="submit" id="submitBtn" class="btn-primary" style="width: 100%;">Flash Firmware</button>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    const pwd = document.getElementById('pwd'); 
    const confirmPwd = document.getElementById('confirmPwd'); 
    const errorMsg = document.getElementById('pwdError'); 
    const submitBtn = document.getElementById('submitBtn');
    
    function validatePasswords() { 
        if (confirmPwd.value && pwd.value !== confirmPwd.value) { 
            errorMsg.style.display = 'block'; 
            submitBtn.style.opacity = '0.5';
            submitBtn.style.pointerEvents = 'none';
        } else { 
            errorMsg.style.display = 'none'; 
            submitBtn.style.opacity = '1';
            submitBtn.style.pointerEvents = 'auto';
        } 
    }
    pwd.addEventListener('input', validatePasswords); 
    confirmPwd.addEventListener('input', validatePasswords);
</script>
{% endblock %}
